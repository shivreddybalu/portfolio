name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: |
          echo "export const environment = { production: false, geminiApiKey: '${{ secrets.GEMINI_API_KEY }}' };" > src/environments/environment.ts
          echo "export const environment = { production: true, geminiApiKey: '${{ secrets.GEMINI_API_KEY }}' };" > src/environments/environment.prod.ts

      - name: Build
        run: npm run build -- --base-href=/portfolio/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/shiv-app/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
