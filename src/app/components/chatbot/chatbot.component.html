<!-- Floating Chat Button -->
<div *ngIf="!isOpen" 
  class="fixed bottom-6 right-6 z-50 group cursor-pointer"
  (click)="toggleChat()">
  
  <!-- Pulse Animation Ring -->
  <div class="absolute inset-0 bg-gradient-to-r from-violet-500 to-purple-500 rounded-full animate-ping opacity-30"></div>
  
  <!-- Chat Button -->
  <div class="relative w-16 h-16 bg-gradient-to-r from-violet-600 to-purple-600 rounded-full flex items-center justify-center shadow-2xl shadow-violet-500/50 hover:shadow-violet-500/70 hover:scale-110 transition-all duration-300">
    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
    </svg>
  </div>

  <!-- Notification Badge -->
  <div class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full border-2 border-gray-950 flex items-center justify-center">
    <span class="text-white text-xs font-bold">1</span>
  </div>
</div>

<!-- Chat Window -->
<div *ngIf="isOpen" 
  class="fixed bottom-6 right-6 z-50 w-[380px] max-w-[calc(100vw-3rem)] animate-slide-up">
  
  <div class="bg-gradient-to-br from-gray-900/95 via-gray-900/90 to-gray-900/95 backdrop-blur-xl border border-gray-800/50 rounded-3xl shadow-2xl shadow-violet-500/20 overflow-hidden"
    [class.h-[500px]]="!isMinimized"
    [class.h-auto]="isMinimized">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-violet-600 to-purple-600 p-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
            <span class="text-lg font-black text-white">SA</span>
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 rounded-full border-2 border-white"></div>
        </div>
        <div>
          <h3 class="text-white font-bold text-base flex items-center gap-2">
            Shiv AI
            <span *ngIf="isApiConfigured" class="text-[10px] font-bold text-emerald-400 bg-emerald-400/20 border border-emerald-400/30 px-2 py-0.5 rounded-full">LIVE</span>
          </h3>
          <p class="text-violet-100 text-xs flex items-center gap-1">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
            {{ isApiConfigured ? 'Powered by Gemini AI' : 'Quick Responses' }}
          </p>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <!-- Minimize Button -->
        <button (click)="toggleMinimize()" 
          class="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all duration-200">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="isMinimized ? 'M5 15l7-7 7 7' : 'M19 9l-7 7-7-7'"/>
          </svg>
        </button>
        
        <!-- Close Button -->
        <button (click)="toggleChat()" 
          class="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all duration-200">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat Content -->
    <div *ngIf="!isMinimized" class="flex flex-col h-[calc(500px-80px)]">
      
      <!-- Messages Area -->
      <div #messagesContainer class="flex-1 overflow-y-auto p-5 space-y-4">
        
        <!-- Message Bubbles -->
        <div *ngFor="let message of messages" 
          class="flex"
          [class.justify-end]="message.sender === 'user'"
          [class.justify-start]="message.sender === 'bot'">
          
          <div class="max-w-[75%]">
            
            <!-- Bot Avatar -->
            <div *ngIf="message.sender === 'bot'" class="flex items-start gap-2 mb-1">
              <div class="w-7 h-7 rounded-full bg-gradient-to-r from-violet-500 to-purple-500 flex items-center justify-center flex-shrink-0">
                <span class="text-xs font-black text-white">SA</span>
              </div>
            </div>

            <!-- Message Bubble -->
            <div [ngClass]="{
              'rounded-2xl px-4 py-3 break-words': true,
              'bg-gradient-to-r from-violet-600 to-purple-600 text-white': message.sender === 'user',
              'bg-gray-800/60 text-gray-200 border border-gray-700/50': message.sender === 'bot'
            }">
              <p class="text-sm leading-relaxed whitespace-pre-line">{{ message.text }}</p>
              <p class="text-xs mt-1.5 opacity-70">
                {{ message.timestamp | date:'shortTime' }}
              </p>
            </div>
          </div>
        </div>

        <!-- Typing Indicator -->
        <div *ngIf="isTyping" class="flex justify-start">
          <div class="flex items-start gap-2">
            <div class="w-7 h-7 rounded-full bg-gradient-to-r from-violet-500 to-purple-500 flex items-center justify-center">
              <span class="text-xs font-black text-white">SA</span>
            </div>
            <div class="bg-gray-800/60 border border-gray-700/50 rounded-2xl px-5 py-3">
              <div class="flex gap-1">
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Suggestions (shown when no messages) -->
        <div *ngIf="messages.length === 1" class="grid grid-cols-2 gap-2 mt-4">
          <button (click)="userInput = 'skills'; sendMessage()"
            class="text-xs text-violet-300 bg-violet-500/10 border border-violet-500/30 rounded-xl px-3 py-2 hover:bg-violet-500/20 transition-all duration-200">
            💻 Skills
          </button>
          <button (click)="userInput = 'projects'; sendMessage()"
            class="text-xs text-cyan-300 bg-cyan-500/10 border border-cyan-500/30 rounded-xl px-3 py-2 hover:bg-cyan-500/20 transition-all duration-200">
            🚀 Projects
          </button>
          <button (click)="userInput = 'experience'; sendMessage()"
            class="text-xs text-emerald-300 bg-emerald-500/10 border border-emerald-500/30 rounded-xl px-3 py-2 hover:bg-emerald-500/20 transition-all duration-200">
            💼 Experience
          </button>
          <button (click)="userInput = 'contact'; sendMessage()"
            class="text-xs text-pink-300 bg-pink-500/10 border border-pink-500/30 rounded-xl px-3 py-2 hover:bg-pink-500/20 transition-all duration-200">
            📧 Contact
          </button>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4 bg-gray-900/80 border-t border-gray-800/50">
        <form (ngSubmit)="sendMessage()" class="flex gap-2">
          <input 
            type="text" 
            [(ngModel)]="userInput"
            name="chatInput"
            placeholder="Type your message..."
            class="flex-1 bg-gray-800/60 border border-gray-700/50 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-500 focus:shadow-lg focus:shadow-violet-500/20 transition-all duration-300"
            [disabled]="isTyping">
          
          <button 
            type="submit"
            [disabled]="!userInput.trim() || isTyping"
            class="w-12 h-12 rounded-xl bg-gradient-to-r from-violet-600 to-purple-600 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-lg hover:shadow-violet-500/50 hover:scale-105 transition-all duration-200">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </form>

        <!-- Clear Chat Button -->
        <button *ngIf="messages.length > 1" (click)="clearChat()"
          class="mt-2 text-xs text-gray-500 hover:text-gray-300 transition-colors duration-200 flex items-center gap-1 mx-auto">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Clear chat
        </button>
      </div>

    </div>

  </div>
</div>
