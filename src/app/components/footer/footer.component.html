<footer class="bg-gray-900 border-t border-gray-800 py-10">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex flex-col md:flex-row items-center justify-between gap-6" appReveal>

      <div class="text-center md:text-left">
        <p class="text-xl font-bold bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent animate-gradient-x"
          style="background-size: 200%">
          {{ portfolio.name }}
        </p>
        <p class="text-gray-500 text-sm mt-1">{{ portfolio.title }}</p>
      </div>

      <nav class="flex gap-6">
        <a *ngFor="let item of portfolio.nav"
          (click)="navigate(item.route)"
          class="text-gray-500 hover:text-violet-400 text-sm transition-all duration-200 cursor-pointer hover:-translate-y-0.5 relative group">
          {{ item.label }}
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-violet-400 group-hover:w-full transition-all duration-300"></span>
        </a>
      </nav>

      <div class="flex gap-4">
        <a [href]="portfolio.linkedin" target="_blank"
          class="w-9 h-9 rounded-lg bg-gray-800 border border-gray-700 flex items-center justify-center text-gray-400 hover:text-cyan-400 hover:border-cyan-500 hover:scale-110 hover:shadow-lg hover:shadow-cyan-500/20 transition-all duration-200">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </div>

    </div>

    <div class="mt-8 pt-6 border-t border-gray-800 text-center" appReveal>
      <p class="text-gray-600 text-sm">
        © {{ year }} {{ portfolio.name }} · Built with
        <span class="text-violet-400 font-medium">Angular 17</span> &
        <span class="text-cyan-400 font-medium">Tailwind CSS</span>
      </p>
      <button (click)="scrollTop()"
        class="mt-4 w-9 h-9 mx-auto flex items-center justify-center rounded-full border border-gray-700 text-gray-500 hover:border-violet-500 hover:text-violet-400 hover:-translate-y-1 hover:shadow-lg hover:shadow-violet-500/20 transition-all duration-200">
        ↑
      </button>
    </div>
  </div>
</footer>
