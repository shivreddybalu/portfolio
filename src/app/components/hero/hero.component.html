<section id="hero" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gray-950">

  <!-- Particles -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div *ngFor="let p of particles" class="particle absolute rounded-full"
      [style.left.%]="p.x"
      [style.width.px]="p.size"
      [style.height.px]="p.size"
      [style.background]="p.color"
      [style.animation-duration.s]="p.duration"
      [style.animation-delay.s]="p.delay">
    </div>
  </div>

  <!-- Animated blobs -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-violet-600/15 rounded-full blur-3xl"
      style="animation: floatAvatar 8s ease-in-out infinite"></div>
    <div class="absolute -bottom-40 -right-40 w-[500px] h-[500px] bg-cyan-600/15 rounded-full blur-3xl"
      style="animation: floatAvatar 10s ease-in-out infinite reverse"></div>
    <div class="absolute top-1/3 left-1/2 w-72 h-72 bg-purple-600/10 rounded-full blur-3xl"
      style="animation: floatAvatar 6s ease-in-out infinite 2s"></div>
  </div>

  <!-- Grid overlay -->
  <div class="absolute inset-0 opacity-30"
    style="background-image: linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.05) 1px, transparent 1px); background-size: 60px 60px;">
  </div>

  <!-- Content -->
  <div class="relative z-10 text-center px-6 max-w-4xl mx-auto">

    <p class="text-violet-400 text-sm font-semibold tracking-[0.3em] uppercase mb-6"
      style="animation: fade-up 0.6s ease-out 0.1s both">
      👋 Welcome to my portfolio
    </p>

    <h1 class="text-5xl md:text-7xl font-black text-white mb-4 leading-tight"
      style="animation: fade-up 0.7s ease-out 0.2s both">
      Hi, I'm
      <span class="shimmer-text block md:inline"> {{ portfolio.name }}</span>
    </h1>

    <!-- Typewriter -->
    <h2 class="text-2xl md:text-3xl font-semibold text-gray-300 mb-6 h-10 flex items-center justify-center gap-1"
      style="animation: fade-up 0.7s ease-out 0.35s both">
      <span class="text-violet-400">{{ displayedTitle }}</span>
      <span class="w-0.5 h-7 bg-violet-400 inline-block"
        style="animation: blink 0.8s step-end infinite"></span>
    </h2>

    <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed"
      style="animation: fade-up 0.7s ease-out 0.5s both">
      {{ portfolio.tagline }}
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center"
      style="animation: fade-up 0.7s ease-out 0.65s both">
      <button (click)="navigate('/projects')"
        class="btn-neon px-8 py-3 rounded-full bg-gradient-to-r from-violet-600 to-purple-600 text-white font-semibold transition-all duration-300 shadow-lg shadow-violet-500/30 hover:-translate-y-1">
        View My Work →
      </button>
      <button (click)="navigate('/contact')"
        class="glow-ring px-8 py-3 rounded-full border border-gray-600 text-gray-300 font-semibold hover:border-violet-500 hover:text-violet-400 transition-all duration-300 hover:-translate-y-1">
        Contact Me
      </button>
    </div>

    <!-- Stats -->
    <div class="flex gap-8 justify-center mt-14"
      style="animation: fade-up 0.7s ease-out 0.8s both">
      <div class="text-center">
        <p class="text-3xl font-black text-white">4+</p>
        <p class="text-gray-500 text-xs mt-1">Years Exp</p>
      </div>
      <div class="w-px bg-gray-800"></div>
      <div class="text-center">
        <p class="text-3xl font-black text-white">40%</p>
        <p class="text-gray-500 text-xs mt-1">Perf Boost</p>
      </div>
      <div class="w-px bg-gray-800"></div>
      <div class="text-center">
        <p class="text-3xl font-black text-white">90%+</p>
        <p class="text-gray-500 text-xs mt-1">Test Coverage</p>
      </div>
    </div>

    <!-- LinkedIn -->
    <div class="flex justify-center mt-10" style="animation: fade-up 0.7s ease-out 0.9s both">
      <a [href]="portfolio.linkedin" target="_blank"
        class="glow-ring w-11 h-11 rounded-full border border-gray-700 flex items-center justify-center text-gray-400 hover:text-cyan-400 hover:border-cyan-500 hover:scale-110 transition-all duration-300">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
    <div class="w-5 h-9 rounded-full border-2 border-gray-600 flex items-start justify-center p-1">
      <div class="w-1 h-2 bg-violet-400 rounded-full animate-scroll-dot"></div>
    </div>
  </div>

</section>

<style>
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }
</style>
