<section id="projects" class="relative py-24 bg-gradient-to-b from-gray-900 via-gray-950 to-gray-900 overflow-hidden">
  
  <!-- Background Effects -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-violet-500/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 relative z-10">

    <!-- Section Header -->
    <div class="text-center mb-20" appReveal>
      <div class="inline-flex items-center gap-3 bg-violet-500/10 border border-violet-500/20 rounded-full px-6 py-2 mb-4">
        <span class="text-2xl">🚀</span>
        <p class="text-violet-400 text-sm font-semibold tracking-widest uppercase">Portfolio Showcase</p>
      </div>
      
      <h2 class="text-5xl md:text-6xl font-black text-white mb-4">
        Featured <span class="bg-gradient-to-r from-violet-400 via-purple-400 to-cyan-400 text-transparent bg-clip-text">Projects</span>
      </h2>
      <p class="text-gray-400 text-lg max-w-2xl mx-auto">Transforming ideas into powerful digital solutions</p>
      <div class="mt-6 w-24 h-1 bg-gradient-to-r from-violet-500 via-purple-500 to-cyan-500 mx-auto rounded-full"></div>
    </div>

    <!-- Projects Grid -->
    <div class="grid md:grid-cols-2 gap-8">
      <div *ngFor="let project of displayed; let i = index" appReveal
        class="group relative bg-gradient-to-br from-gray-900/90 via-gray-900/70 to-gray-900/90 backdrop-blur-xl border border-gray-800/50 rounded-3xl overflow-hidden hover:border-violet-500/50 transition-all duration-500 hover:scale-[1.02] hover:shadow-2xl hover:shadow-violet-500/20"
        [style.animation-delay.ms]="i * 100">

        <!-- Top Accent Bar with Gradient -->
        <div class="h-2 w-full bg-gradient-to-r" [ngClass]="project.gradient"></div>

        <!-- Card Content -->
        <div class="p-8">
          
          <!-- Featured Badge -->
          <div class="flex items-start justify-between mb-4">
            <div *ngIf="project.featured" class="inline-flex items-center gap-2 text-xs font-bold text-amber-400 bg-gradient-to-r from-amber-400/20 to-orange-400/20 border border-amber-400/30 px-4 py-2 rounded-full backdrop-blur-sm">
              <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-400"></span>
              </span>
              Featured Project
            </div>
            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <div class="w-8 h-8 rounded-lg bg-violet-500/10 border border-violet-500/30 flex items-center justify-center text-violet-400 hover:bg-violet-500/20 transition-colors cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Project Title -->
          <h3 class="text-white font-bold text-2xl mb-4 group-hover:text-transparent group-hover:bg-gradient-to-r group-hover:from-violet-400 group-hover:to-cyan-400 group-hover:bg-clip-text transition-all duration-300">
            {{ project.title }}
          </h3>

          <!-- Description -->
          <p class="text-gray-400 text-base leading-relaxed mb-6 line-clamp-3">{{ project.description }}</p>

          <!-- Tech Tags -->
          <div class="flex flex-wrap gap-2 mb-6">
            <span *ngFor="let tag of project.tags"
              class="group/tag relative text-xs font-semibold text-violet-300 bg-violet-500/10 border border-violet-500/30 px-4 py-1.5 rounded-full hover:bg-violet-500/20 hover:scale-105 transition-all duration-200 cursor-default">
              <span class="relative z-10">{{ tag }}</span>
              <div class="absolute inset-0 rounded-full bg-gradient-to-r from-violet-500/0 via-purple-500/20 to-cyan-500/0 opacity-0 group-hover/tag:opacity-100 transition-opacity duration-300"></div>
            </span>
          </div>

          <!-- Project Stats or Features -->
          <div class="flex items-center gap-4 text-xs text-gray-500 pt-4 border-t border-gray-800/50">
            <div class="flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>2024</span>
            </div>
            <div class="flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Completed</span>
            </div>
          </div>
        </div>

        <!-- Hover Glow Effect -->
        <div class="absolute inset-0 rounded-3xl bg-gradient-to-br from-violet-500/0 via-purple-500/0 to-cyan-500/0 group-hover:from-violet-500/5 group-hover:via-purple-500/5 group-hover:to-cyan-500/5 transition-all duration-500 pointer-events-none"></div>
      </div>
    </div>

    <!-- View All Button -->
    <div class="text-center mt-12" *ngIf="projects.length > 4" appReveal>
      <button (click)="showAll = !showAll"
        class="group relative px-10 py-4 rounded-full border-2 border-gray-700 text-gray-300 font-semibold hover:border-violet-500 hover:text-white transition-all duration-300 overflow-hidden">
        <span class="relative z-10 flex items-center gap-2">
          {{ showAll ? '← Show Less' : 'View All Projects →' }}
        </span>
        <div class="absolute inset-0 bg-gradient-to-r from-violet-600/0 via-purple-600/0 to-cyan-600/0 group-hover:from-violet-600/20 group-hover:via-purple-600/20 group-hover:to-cyan-600/20 transition-all duration-300"></div>
      </button>
    </div>

  </div>
</section>
