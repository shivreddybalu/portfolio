<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Text "BS" -->
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="45" font-weight="bold" 
        fill="white" text-anchor="middle" dominant-baseline="central">BS</text>
  
  <!-- Subtle border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</svg>
